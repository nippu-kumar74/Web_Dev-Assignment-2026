<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .nav{
            text-align: center;
            height: 40px;
            width: 100vw;
            background-color: greenyellow;
            position: sticky;
            top: 0px;
            text-align: center;
        }
        .container{
            margin: 20px;
            height: 300px;
            width: 65vw;
            background-color:red;
            border-radius: 50px;
            position: relative;
            bottom:auto;
        }

        button{
            position:absolute;
            background-color: aqua;
            height: 30px;
            width: 60px;
            border-radius: 20px;
        }
        .b1{
            position: absolute;
            left: 80px;
            top: 40px;
        }
        .b2{
            position: absolute;
            left: 650px;
            top: 40px;
        }
        .b3{
            position: absolute;
            left: 360px;
            bottom: 0px;
            top: 150px;
        }
        .b4{
            position: absolute;
            left: 80px;
            top: 250px;
        }
        .b5{
            position: absolute;
            left: 650px;
            top: 250px;
        }
    </style>
</head>
<body>
    <nav class="nav">NAVBAR</nav><br>

    <div class="container">
    <button class="b1">A</button>
    <button class="b2">B</button>
    <button class="b3">C</button>
    <button class="b4">D</button>
    <button class="b5">E</button>
    </div>
</body>
</html>
